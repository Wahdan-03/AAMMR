# nav2_params.yaml
# Tuned for:
#   Hardware : Raspberry Pi 4
#   Robot    : Differential drive AMR
#   LiDAR    : LD19 (max range 8 m, real max reliable ~5 m)
#   Wheels   : JGY-370, 0.065 m diameter, 0.175 m base
# ──────────────────────────────────────────────────────────────────────────────

amcl:
  ros__parameters:
    use_sim_time: false

    # Motion model noise — keep high since wheel odometry has high covariance
    odom_model_type: "diff"
    alpha1: 2.0
    alpha2: 2.0
    alpha3: 2.0
    alpha4: 2.0
    alpha5: 2.0

    # Frames
    base_frame_id:   base_link
    odom_frame_id:   odom
    global_frame_id: map

    # Laser model
    laser_model_type:         "likelihood_field"
    laser_max_range:          5.0
    laser_min_range:          0.1
    laser_likelihood_max_dist: 2.0
    max_beams:                60
    sigma_hit:                0.2
    z_hit:                    0.95
    z_max:                    0.02
    z_rand:                   0.01
    z_short:                  0.02
    lambda_short:             0.1

    # FIX: Particles — halved from 2000/500 to cut CPU load on Pi 4.
    #      Localization quality stays acceptable for an indoor office map.
    max_particles: 1000
    min_particles: 200

    # FIX: Update thresholds — was 0.5 m / 0.5 rad (28°), far too infrequent
    #      for a small office. Now updates every 15 cm or 11°.
    update_min_d: 0.15    # was 0.5
    update_min_a: 0.2     # was 0.5

    resample_interval: 1
    pf_err:            0.05
    pf_z:              0.99

    # Beam skip (leave off — adds CPU cost)
    do_beamskip:              false
    beam_skip_distance:       0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold:      0.3

    tf_broadcast:       true
    transform_tolerance: 1.0
    save_pose_rate:     0.5

    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    set_initial_pose: false

    robot_model_type: nav2_amcl::DifferentialMotionModel
    scan_topic: /scan_throttled

# ──────────────────────────────────────────────────────────────────────────────

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame:      map
    robot_base_frame:  base_link
    odom_topic:        /odom

    # FIX: bt_loop_duration was 10 ms (= 100 Hz target).
    #      Pi 4 was achieving only ~17 Hz → constant WARN flood.
    #      50 ms = 20 Hz, which the Pi 4 comfortably sustains.
    bt_loop_duration: 50    # was 10

    # FIX: default_server_timeout was 20 s. The log shows the planner
    #      timed out at exactly 20 s because the CPU-loaded Pi couldn't
    #      respond in time. Raised to 60 s.
    default_server_timeout: 60    # was 20

    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator

# ──────────────────────────────────────────────────────────────────────────────

controller_server:
  ros__parameters:
    use_sim_time: false

    # FIX: controller_frequency was 20 Hz. Lowered to 10 Hz to give the Pi 4
    #      CPU headroom. RPP is cheap but 20 Hz adds up alongside the planner.
    controller_frequency: 10.0    # was 20.0

    # Velocity thresholds — min_y stays high (diff-drive has no lateral motion)
    min_x_velocity_threshold:     0.001
    min_y_velocity_threshold:     0.5
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3
    odom_topic: odom

    progress_checker_plugin: progress_checker
    goal_checker_plugins:    [general_goal_checker]
    controller_plugins:      [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      # FIX: was 10 s. CPU stalls slow the robot startup. Extended to 20 s
      #      so the progress checker doesn't abort before the robot moves.
      movement_time_allowance: 20.0    # was 10.0

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance:  0.15
      yaw_goal_tolerance: 0.15

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController

      desired_linear_vel:          0.2
      lookahead_dist:              0.4
      min_lookahead_dist:          0.3
      max_lookahead_dist:          0.9
      lookahead_time:              1.5
      rotate_to_heading_angular_vel: 0.8

      # FIX: transform_tolerance was 0.1 s — the CRITICAL cause of
      #      "Failed to make progress". With the BT running at ~17 Hz
      #      instead of 100 Hz, TF frames can be up to ~60 ms stale.
      #      RPP was rejecting every TF lookup and immediately aborting.
      #      0.5 s gives the Pi 4 sufficient headroom.
      transform_tolerance: 0.5    # was 0.1

      use_velocity_scaled_lookahead_dist:  true
      min_approach_linear_velocity:        0.05
      approach_velocity_scaling_dist:      0.6
      use_collision_detection:             true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead:       false
      curvature_lookahead_dist:            0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed:  0.25
      use_rotate_to_heading:               true
      allow_reversing:                     false
      rotate_to_heading_min_angle:         0.785
      max_angular_accel:                   3.2
      max_robot_pose_search_dist:          10.0

# ──────────────────────────────────────────────────────────────────────────────

planner_server:
  ros__parameters:
    use_sim_time: false

    # FIX: expected_planner_frequency was 20 Hz. Pi 4 was only achieving
    #      10.3 Hz → constant WARN. Set to 5 Hz to silence false warnings;
    #      NavFn at 10 Hz is perfectly fine for a slow AMR.
    expected_planner_frequency: 5.0    # was 20.0

    planner_plugins: [GridBased]
    GridBased:
      plugin:        nav2_navfn_planner/NavfnPlanner
      tolerance:     0.5
      use_astar:     false
      allow_unknown: true

# ──────────────────────────────────────────────────────────────────────────────

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic:   local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame:    odom
    robot_base_frame: base_link

    # FIX: transform_timeout was 0.1 s. Same Pi 4 TF lag issue as RPP.
    #      Spin recovery was aborting because it couldn't look up TF
    #      within 100 ms on a loaded CPU.
    transform_timeout: 0.5    # was 0.1

    simulate_ahead_time: 2.0
    max_rotational_vel:  1.0
    min_rotational_vel:  0.4
    rotational_acc_lim:  3.2

    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

# ──────────────────────────────────────────────────────────────────────────────

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame:      odom
      robot_base_frame:  base_link
      rolling_window:    true
      width:  3
      height: 3
      resolution: 0.05
      robot_radius: 0.15
      update_frequency:  5.0
      publish_frequency: 2.0

      # FIX: was [voxel_layer, inflation_layer].
      #      VoxelLayer does full 3D raycasting which is very expensive on
      #      a Pi 4 — a major contributor to the BT tick rate being missed.
      #      ObstacleLayer is 2D and sufficient for a flat indoor environment.
      plugins: [obstacle_layer, inflation_layer]    # was [voxel_layer, ...]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_throttled
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.3

      always_send_full_costmap: true

# ──────────────────────────────────────────────────────────────────────────────

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame:     map
      robot_base_frame: base_link
      robot_radius:     0.15
      resolution:       0.05
      track_unknown_space: true
      update_frequency:  1.0
      publish_frequency: 1.0

      plugins: [static_layer, obstacle_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_throttled
          max_obstacle_height: 1.2
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.3

      always_send_full_costmap: true

# ──────────────────────────────────────────────────────────────────────────────

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''

# ──────────────────────────────────────────────────────────────────────────────

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    # FIX: loop_rate was 20 Hz — minor but unnecessary CPU load when idle
    loop_rate: 10    # was 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200
