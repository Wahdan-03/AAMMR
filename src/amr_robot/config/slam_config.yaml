slam_toolbox:
  ros__parameters:
    mode: mapping

    # ── Frames & Topics ──────────────────────────────────────────────────────
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan

    # ── Odometry ─────────────────────────────────────────────────────────────
    # Kept false — wheel odometry is unreliable on this hardware.
    # All scan-rate and search parameters below are tuned to compensate.
    use_odometry: false

    # ── Scan matching ────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: false   # saves CPU on Pi 4

    # ── Scan rate ────────────────────────────────────────────────────────────
    # ROOT CAUSE FIX: throttle_scans was 30 = 1 scan every 3 seconds.
    # At 0.2 m/s the robot moves 60 cm between processed scans.
    # Without odometry, the matcher had to search a 60 cm pose space
    # on every tick → frequent false minima → scans stamped at wrong pose
    # → fake walls drawn on top of real ones.
    #
    # throttle_scans: 3 = 1 scan every 0.3 s = ~3 Hz effective rate.
    # At 0.2 m/s the robot moves only 6 cm between scans.
    # The matcher finds the correct alignment almost every time.
    throttle_scans: 3            # was 30

    # Hard floor on scan acceptance interval. Was 1000 ms (1 scan/sec),
    # which conflicted with throttle_scans:3. Now 200 ms → up to 5 scans/sec,
    # letting throttle_scans be the effective rate limiter.
    minimum_time_interval_ms: 200   # was 1000

    # ── Map ──────────────────────────────────────────────────────────────────
    resolution: 0.05             # 5 cm/cell — optimal for LD19, do not lower
    map_update_interval: 1.0     # was 3.0 — refresh map display every second

    # ── Laser ────────────────────────────────────────────────────────────────
    laser_max_range: 5.0
    laser_min_range: 0.1

    # ── Scan matcher search space ────────────────────────────────────────────
    # How far the matcher searches around the predicted pose.
    # With no odometry, predicted pose = last pose (no motion model).
    # Must be larger than the maximum robot displacement between scans.
    # At throttle_scans:3 and 0.2 m/s: max displacement ~6 cm.
    # 0.5 m gives 8x safety margin — enough for occasional jitter.
    search_size:              0.5    # metres, search window around predicted pose
    search_maximum_distance:  0.5    # max distance from predicted pose to accept match
    coarse_search_angle_offset: 0.349  # ±20° coarse angular search
    coarse_angle_resolution:    0.0349 # 2° steps during coarse search
    fine_search_angle_offset:   0.00349 # ±0.2° fine search
    angular_search_resolution:  0.000349 # 0.02° steps during fine search

    # Minimum matcher response to accept a pose (0–1).
    # Default 0.45 — too strict when scan overlap is low (sparse environments,
    # doorways, corridors). Lowered to 0.35 so the matcher accepts slightly
    # weaker but still valid alignments instead of snapping to a false minimum.
    link_match_minimum_response_fine:   0.35   # was default 0.45
    link_scan_maximum_distance:         1.5    # max range between linked scans

    # ── Update thresholds ────────────────────────────────────────────────────
    # SLAM only processes a scan if the robot has moved at least this much
    # since the last processed scan. Default 0.5 m / 0.5 rad is too coarse —
    # the robot may complete an entire turn before SLAM updates once.
    minimum_travel_distance: 0.1   # was default 0.5 m
    minimum_travel_heading:  0.1   # was default 0.5 rad (~28°)

    # ── Loop closure ─────────────────────────────────────────────────────────
    # DISABLED. Loop closure with unreliable odometry and no motion model
    # causes false closures — the single biggest source of instant fake walls.
    # Re-enable only after the base mapping is consistently clean.
    do_loop_closing: false         # was true

    # ── Scan buffer ──────────────────────────────────────────────────────────
    # How many scans SLAM keeps in memory for scan-to-map matching.
    # Default 10 is too small on a loaded Pi — scans get dropped before
    # they can be matched, leaving gaps in the map.
    scan_buffer_size: 20                         # was default 10
    scan_buffer_maximum_scan_distance: 5.0       # match LD19 laser_max_range

    # ── Queue & timing ───────────────────────────────────────────────────────
    message_filter_queue_size:   200
    transform_timeout:           1.0    # was 3.0 — 3s was hiding TF problems
    transform_publish_period_ms: 50
    tf_buffer_duration:          30.0

    # ── Solver ───────────────────────────────────────────────────────────────
    solver_plugin:            solver_plugins::CeresSolver
    ceres_linear_solver:      sparse_normal_cholesky
    ceres_loss_function:      huber
    ceres_dogleg_type:        TRADITIONAL_DOGLEG
    ceres_max_num_iterations: 50
