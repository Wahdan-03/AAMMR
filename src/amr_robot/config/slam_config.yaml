slam_toolbox:
  ros__parameters:
    # Mode
    mode: mapping
    
    # Sensor/Frame Settings
    odom_frame: ""
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_scan_matching: true
    use_odometry: true
    
    # Performance (Simplified for Pi 4)
    resolution: 0.05
    map_update_interval: 2.0
    max_laser_range: 5.0
    throttle_scans: 1
    # Remove if not working
    minimum_time_interval_ms: 50
    transform_publish_period_ms: 100
    max_laser_range: 5.0
    resolution: 0.05
    
    # Solver (Ceres)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: sparse_normal_cholesky
    ceres_loss_function: huber
