slam_toolbox:
  ros__parameters:
    mode: mapping

    # Frames & Topics
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Scan matching
    use_scan_matching: true
    use_odometry: false
    use_scan_barycenter: false   # save CPU

    # Performance – lower resolution for Pi 4
    resolution: 0.05
    map_update_interval: 3.0
    laser_max_range: 5.0
    laser_min_range: 0.1
    throttle_scans: 30
    do_loop_closing: true       # disable until stable

    # Queue & timing
    message_filter_queue_size: 200   # critical!
    transform_timeout: 3.0
    minimum_time_interval_ms: 1000
    transform_publish_period_ms: 50
    tf_buffer_duration: 30.0

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: sparse_normal_cholesky
    ceres_loss_function: huber
