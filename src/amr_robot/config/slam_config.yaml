slam_toolbox:
  ros__parameters:
    mode: mapping

    # Frames & Topics
    odom_frame: ""          # Empty → ignore odometry (use LiDAR only)
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_throttled   # use throttled topic

    # Scan matching
    use_scan_matching: true
    use_odometry: false     # explicitly disable odometry input
    use_scan_barycenter: true

    # Performance
    resolution: 0.10        # 10 cm – faster, good for LD19
    map_update_interval: 2.0
    max_laser_range: 5.0
    throttle_scans: 1       # already throttled externally

    # Timing (avoid queue overflow)
    transform_timeout: 1.0
    minimum_time_interval_ms: 50
    transform_publish_period_ms: 100

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: sparse_normal_cholesky
    ceres_loss_function: huber
