slam_toolbox:
  ros__parameters:
    # Mode
    mode: mapping
    
    # Sensor/Frame Settings
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    
    # Performance (Simplified for Pi 4)
    resolution: 0.05
    map_update_interval: 2.0
    max_laser_range: 5.0
    throttle_scans: 1
    
    # Solver (Ceres)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: sparse_normal_cholesky
    ceres_loss_function: huber
